name: "CodeQL"

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  schedule:
    - cron: '27 1 * * 6'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [ 'cpp' ]

    steps:
    - uses: actions/checkout@v2
    - name: Initialize CodeQL
      uses: github/codeql-action/init@v1
      with:
        languages: ${{ matrix.language }}
        queries: +security-and-quality
    - run: |
       sudo apt-get update
       sudo apt-get install -y \
         liblua5.3-dev \
         libpcre2-dev \
         libsystemd-dev \
         ninja-build \
         socat
       make -j$(nproc) all TARGET=linux-glibc \
         USE_PCRE=1 \
         USE_PCRE_JIT=1 \
         USE_LUA=1 \
         USE_OPENSSL=1 \
         USE_SYSTEMD=1 \
         USE_PROMEX=1 \
         DEBUG="-DDEBUG_STRICT=1 -DDEBUG_USE_ABORT=1"
    - uses: github/codeql-action/analyze@v1
